<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Journal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* =====================
           THEME VARIABLES
        ===================== */
        :root {
            --bg: #f5f5f0;
            --surface: #ffffff;
            --surface2: #f0f0ea;
            --text: #1a1a1a;
            --text2: #666;
            --accent: #1a1a1a;
            --accent-text: #ffffff;
            --border: #e0e0d8;
            --shadow: rgba(0,0,0,0.07);
            --tag-bg: #eee;
            --font-display: 'Playfair Display', serif;
            --font-body: 'DM Sans', sans-serif;
            --radius: 14px;
            --card-hover: translateY(-3px);
        }

        [data-theme="dark"] {
            --bg: #0f0f13;
            --surface: #1a1a22;
            --surface2: #22222e;
            --text: #e8e8f0;
            --text2: #888;
            --accent: #7c6af7;
            --accent-text: #ffffff;
            --border: #2a2a38;
            --shadow: rgba(0,0,0,0.4);
            --tag-bg: #2a2a38;
        }

        [data-theme="paper"] {
            --bg: #f2ede4;
            --surface: #fdf8f0;
            --surface2: #ede8de;
            --text: #3d2b1f;
            --text2: #8a7060;
            --accent: #b5451b;
            --accent-text: #fff;
            --border: #ddd5c5;
            --shadow: rgba(100,60,20,0.1);
            --tag-bg: #e8e0d0;
            --font-display: 'Caveat', cursive;
        }

        [data-theme="forest"] {
            --bg: #e8f0e8;
            --surface: #f2f7f2;
            --surface2: #dde8dd;
            --text: #1a2e1a;
            --text2: #4a6a4a;
            --accent: #2d6a2d;
            --accent-text: #fff;
            --border: #c5d8c5;
            --shadow: rgba(20,60,20,0.08);
            --tag-bg: #d5e8d5;
        }

        [data-theme="cartoon"] {
            --bg: #fff9c4;
            --surface: #ffffff;
            --surface2: #fff3a0;
            --text: #1a1a1a;
            --text2: #555;
            --accent: #ff4757;
            --accent-text: #fff;
            --border: #ffd700;
            --shadow: rgba(255,71,87,0.15);
            --tag-bg: #ffe066;
            --radius: 20px;
        }

        [data-theme="galaxy"] {
            --bg: #05050f;
            --surface: #0d0d25;
            --surface2: #12122e;
            --text: #e0e0ff;
            --text2: #7070aa;
            --accent: #a855f7;
            --accent-text: #fff;
            --border: #1e1e45;
            --shadow: rgba(168,85,247,0.15);
            --tag-bg: #1a1a40;
        }

        /* =====================
           BASE
        ===================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body, 'DM Sans', sans-serif);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        /* =====================
           LAYOUT
        ===================== */
        .app {
            max-width: 780px;
            margin: 0 auto;
            padding: 0 20px 80px;
        }

        /* =====================
           HEADER
        ===================== */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 32px 0 24px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 28px;
        }

        .header-left h1 {
            font-family: var(--font-display, 'Playfair Display', serif);
            font-size: 28px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.5px;
        }

        .header-left p {
            font-size: 13px;
            color: var(--text2);
            margin-top: 3px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* =====================
           THEME SWITCHER
        ===================== */
        .theme-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 7px 14px;
            font-size: 13px;
            color: var(--text2);
            cursor: pointer;
            font-family: var(--font-body, 'DM Sans', sans-serif);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .theme-btn:hover { border-color: var(--accent); color: var(--text); }

        .theme-panel {
            position: fixed;
            top: 0; right: -280px;
            width: 260px;
            height: 100vh;
            background: var(--surface);
            border-left: 1px solid var(--border);
            padding: 24px 20px;
            z-index: 100;
            transition: right 0.3s ease;
            box-shadow: -4px 0 20px var(--shadow);
        }
        .theme-panel.open { right: 0; }

        .theme-panel h3 {
            font-size: 14px;
            font-weight: 500;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 20px;
        }

        .theme-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.15s;
            margin-bottom: 6px;
        }
        .theme-option:hover { background: var(--surface2); }
        .theme-option.active { background: var(--surface2); }

        .theme-swatch {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid var(--border);
            flex-shrink: 0;
        }

        .theme-option span {
            font-size: 14px;
            color: var(--text);
        }

        .close-panel {
            position: absolute;
            top: 20px; right: 20px;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--text2);
        }

        /* =====================
           LOGOUT
        ===================== */
        .logout-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 7px 14px;
            font-size: 13px;
            color: var(--text2);
            cursor: pointer;
            font-family: var(--font-body, 'DM Sans', sans-serif);
            transition: all 0.2s;
        }
        .logout-btn:hover { border-color: #cc0000; color: #cc0000; }

        /* =====================
           SEARCH + ADD ROW
        ===================== */
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        .search-wrap {
            flex: 1;
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text2);
            font-size: 15px;
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            padding: 11px 16px 11px 40px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 999px;
            font-size: 14px;
            color: var(--text);
            font-family: var(--font-body, 'DM Sans', sans-serif);
            outline: none;
            transition: border-color 0.2s;
        }
        .search-input::placeholder { color: var(--text2); }
        .search-input:focus { border-color: var(--accent); }

        .add-btn {
            background: var(--accent);
            color: var(--accent-text);
            border: none;
            border-radius: 999px;
            padding: 11px 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            font-family: var(--font-body, 'DM Sans', sans-serif);
            white-space: nowrap;
            transition: opacity 0.2s, transform 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .add-btn:hover { opacity: 0.85; transform: scale(1.02); }

        /* =====================
           JOURNAL CARDS
        ===================== */
        .journals-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .journal-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px 24px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            position: relative;
        }
        .journal-card:hover {
            transform: var(--card-hover);
            box-shadow: 0 8px 24px var(--shadow);
            border-color: var(--accent);
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
        }

        .card-title {
            font-family: var(--font-display, 'Playfair Display', serif);
            font-size: 18px;
            color: var(--text);
            line-height: 1.3;
        }

        .card-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .journal-card:hover .card-actions { opacity: 1; }

        .card-action-btn {
            background: var(--surface2);
            border: none;
            border-radius: 8px;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
            color: var(--text2);
        }
        .card-action-btn:hover { background: var(--border); }
        .card-action-btn.delete:hover { background: #ffeeee; color: #cc0000; }

        .card-content {
            font-size: 14px;
            color: var(--text2);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-date {
            font-size: 12px;
            color: var(--text2);
            margin-top: 14px;
            opacity: 0.7;
        }

        /* =====================
           EMPTY STATE
        ===================== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text2);
        }
        .empty-state .emoji { font-size: 48px; margin-bottom: 16px; }
        .empty-state h3 { font-family: var(--font-display); font-size: 20px; color: var(--text); margin-bottom: 8px; }
        .empty-state p { font-size: 14px; }

        /* =====================
           PAGINATION
        ===================== */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 32px;
        }

        .page-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 8px 18px;
            font-size: 13px;
            color: var(--text);
            cursor: pointer;
            font-family: var(--font-body);
            transition: all 0.2s;
        }
        .page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .page-info {
            font-size: 13px;
            color: var(--text2);
        }

        /* =====================
           MODAL
        ===================== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.open { display: flex; }

        .modal {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 32px;
            width: 100%;
            max-width: 540px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            animation: modalIn 0.2s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.96) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal h2 {
            font-family: var(--font-display);
            font-size: 22px;
            color: var(--text);
            margin-bottom: 24px;
        }

        .form-field { margin-bottom: 18px; }

        .form-field label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .form-field input,
        .form-field textarea {
            width: 100%;
            padding: 12px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            color: var(--text);
            font-family: var(--font-body);
            outline: none;
            transition: border-color 0.2s;
            resize: none;
        }
        .form-field input:focus,
        .form-field textarea:focus { border-color: var(--accent); }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        .btn-cancel {
            background: none;
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 10px 20px;
            font-size: 14px;
            color: var(--text2);
            cursor: pointer;
            font-family: var(--font-body);
            transition: all 0.2s;
        }
        .btn-cancel:hover { border-color: var(--text); color: var(--text); }

        .btn-save {
            background: var(--accent);
            color: var(--accent-text);
            border: none;
            border-radius: 999px;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            font-family: var(--font-body);
            transition: opacity 0.2s;
        }
        .btn-save:hover { opacity: 0.85; }
        .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

        /* =====================
           TOAST
        ===================== */
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--text);
            color: var(--bg);
            padding: 12px 24px;
            border-radius: 999px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
            z-index: 999;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* =====================
           LOADING
        ===================== */
        .loading {
            text-align: center;
            padding: 48px;
            color: var(--text2);
            font-size: 14px;
        }

        /* =====================
           GALAXY STARS
        ===================== */
        [data-theme="galaxy"] body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.3) 0%, transparent 100%),
                              radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.2) 0%, transparent 100%),
                              radial-gradient(1px 1px at 50% 70%, rgba(255,255,255,0.15) 0%, transparent 100%);
            pointer-events: none;
            z-index: 0;
        }

        /* cartoon special */
        [data-theme="cartoon"] .journal-card {
            border-width: 2px;
            box-shadow: 4px 4px 0 var(--border);
        }
        [data-theme="cartoon"] .journal-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 var(--border);
        }
    </style>
</head>
<body>

<div class="app">
    <!-- HEADER -->
    <header>
        <div class="header-left">
            <h1>My Journal</h1>
            <p id="journalCount">Loading...</p>
        </div>
        <div class="header-right">
            <button class="theme-btn" onclick="toggleThemePanel()">🎨 Theme</button>
            <button class="logout-btn" onclick="logout()">Sign out</button>
        </div>
    </header>

    <!-- TOOLBAR -->
    <div class="toolbar">
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input 
                type="text" 
                class="search-input" 
                id="searchInput"
                placeholder="Search your journals..."
                oninput="handleSearch(this.value)"
            />
        </div>
        <button class="add-btn" onclick="openModal()">
            ✏️ New entry
        </button>
    </div>

    <!-- JOURNALS LIST -->
    <div class="journals-grid" id="journalsList">
        <div class="loading">Loading your journals...</div>
    </div>

    <!-- PAGINATION -->
    <div class="pagination" id="pagination" style="display:none;">
        <button class="page-btn" id="prevBtn" onclick="changePage(-1)">← Previous</button>
        <span class="page-info" id="pageInfo"></span>
        <button class="page-btn" id="nextBtn" onclick="changePage(1)">Next →</button>
    </div>
</div>

<!-- THEME PANEL -->
<div class="theme-panel" id="themePanel">
    <button class="close-panel" onclick="toggleThemePanel()">✕</button>
    <h3>Choose theme</h3>

    <div class="theme-option" onclick="setTheme('default')" id="theme-default">
        <div class="theme-swatch" style="background: linear-gradient(135deg, #f5f5f0, #1a1a1a);"></div>
        <span>Default</span>
    </div>
    <div class="theme-option" onclick="setTheme('dark')" id="theme-dark">
        <div class="theme-swatch" style="background: linear-gradient(135deg, #0f0f13, #7c6af7);"></div>
        <span>Dark</span>
    </div>
    <div class="theme-option" onclick="setTheme('paper')" id="theme-paper">
        <div class="theme-swatch" style="background: linear-gradient(135deg, #fdf8f0, #b5451b);"></div>
        <span>Paper</span>
    </div>
    <div class="theme-option" onclick="setTheme('forest')" id="theme-forest">
        <div class="theme-swatch" style="background: linear-gradient(135deg, #e8f0e8, #2d6a2d);"></div>
        <span>Forest</span>
    </div>
    <div class="theme-option" onclick="setTheme('cartoon')" id="theme-cartoon">
        <div class="theme-swatch" style="background: linear-gradient(135deg, #fff9c4, #ff4757);"></div>
        <span>Cartoon</span>
    </div>
    <div class="theme-option" onclick="setTheme('galaxy')" id="theme-galaxy">
        <div class="theme-swatch" style="background: linear-gradient(135deg, #05050f, #a855f7);"></div>
        <span>Galaxy</span>
    </div>
</div>

<!-- ADD / EDIT MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
    <div class="modal">
        <h2 id="modalTitle">New journal entry</h2>
        <div class="form-field">
            <label>Title</label>
            <input type="text" id="entryTitle" placeholder="What's on your mind?" />
        </div>
        <div class="form-field">
            <label>Content</label>
            <textarea id="entryContent" rows="6" placeholder="Write freely..."></textarea>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-save" id="saveBtn" onclick="saveJournal()">Save entry</button>
        </div>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
    // =============================================
    // STATE
    // =============================================
    const API = 'http://127.0.0.1:8000/api';
    let currentPage = 1;
    let totalCount = 0;
    let nextUrl = null;
    let prevUrl = null;
    let searchTimeout = null;
    let currentSearch = '';
    let editingId = null;

    // =============================================
    // AUTH HELPERS
    // =============================================
    function getToken() {
        return localStorage.getItem('access_token');
    }

    function authHeaders() {
        return {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${getToken()}`
        };
    }

    function logout() {
        localStorage.removeItem('access_token');
        localStorage.removeItem('refresh_token');
        window.location.href = 'login.html';
    }

    // =============================================
    // FETCH JOURNALS
    // What happens:
    // 1. Build URL with page and search params
    // 2. Send GET request with JWT token
    // 3. Render cards from results
    // =============================================
    async function fetchJournals(page = 1, search = '') {
        const list = document.getElementById('journalsList');
        list.innerHTML = '<div class="loading">Loading...</div>';

        let url = `${API}/journals/?page=${page}`;
        if (search) url += `&search=${encodeURIComponent(search)}`;

        try {
            const res = await fetch(url, {
                headers: authHeaders()
            });

            // if token expired → back to login
            if (res.status === 401) {
                logout();
                return;
            }

            const data = await res.json();
            totalCount = data.count;
            nextUrl = data.next;
            prevUrl = data.previous;

            renderJournals(data.results);
            renderPagination(page, data.count);
            updateCount(data.count, search);

        } catch (err) {
            list.innerHTML = '<div class="loading">Could not connect to server.</div>';
        }
    }

    // =============================================
    // RENDER JOURNALS
    // =============================================
    function renderJournals(journals) {
        const list = document.getElementById('journalsList');

        if (journals.length === 0) {
            list.innerHTML = `
                <div class="empty-state">
                    <div class="emoji">📖</div>
                    <h3>No entries yet</h3>
                    <p>Start writing your first journal entry.</p>
                </div>
            `;
            return;
        }

        list.innerHTML = journals.map(j => `
            <div class="journal-card" onclick="openEdit(${j.id}, \`${escapeJs(j.title)}\`, \`${escapeJs(j.content)}\`)">
                <div class="card-header">
                    <div class="card-title">${escapeHtml(j.title)}</div>
                    <div class="card-actions">
                        <button class="card-action-btn" onclick="event.stopPropagation(); openEdit(${j.id}, \`${escapeJs(j.title)}\`, \`${escapeJs(j.content)}\`)">✏️</button>
                        <button class="card-action-btn delete" onclick="event.stopPropagation(); deleteJournal(${j.id})">🗑️</button>
                    </div>
                </div>
                <div class="card-content">${escapeHtml(j.content)}</div>
                <div class="card-date">${formatDate(j.created_at)}</div>
            </div>
        `).join('');
    }

    // =============================================
    // PAGINATION
    // =============================================
    function renderPagination(page, count) {
        const pagination = document.getElementById('pagination');
        const pageSize = 5;
        const totalPages = Math.ceil(count / pageSize);

        if (totalPages <= 1) {
            pagination.style.display = 'none';
            return;
        }

        pagination.style.display = 'flex';
        document.getElementById('pageInfo').textContent = `Page ${page} of ${totalPages}`;
        document.getElementById('prevBtn').disabled = !prevUrl;
        document.getElementById('nextBtn').disabled = !nextUrl;
    }

    function changePage(direction) {
        currentPage += direction;
        fetchJournals(currentPage, currentSearch);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // =============================================
    // SEARCH
    // Debounced — waits 400ms after typing stops
    // =============================================
    function handleSearch(value) {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            currentSearch = value;
            currentPage = 1;
            fetchJournals(1, value);
        }, 400);
    }

    // =============================================
    // MODAL — ADD
    // =============================================
    function openModal() {
        editingId = null;
        document.getElementById('modalTitle').textContent = 'New journal entry';
        document.getElementById('entryTitle').value = '';
        document.getElementById('entryContent').value = '';
        document.getElementById('saveBtn').textContent = 'Save entry';
        document.getElementById('modalOverlay').classList.add('open');
        setTimeout(() => document.getElementById('entryTitle').focus(), 100);
    }

    // =============================================
    // MODAL — EDIT
    // =============================================
    function openEdit(id, title, content) {
        editingId = id;
        document.getElementById('modalTitle').textContent = 'Edit entry';
        document.getElementById('entryTitle').value = title;
        document.getElementById('entryContent').value = content;
        document.getElementById('saveBtn').textContent = 'Update entry';
        document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('open');
        editingId = null;
    }

    function handleOverlayClick(e) {
        if (e.target === document.getElementById('modalOverlay')) closeModal();
    }

    // =============================================
    // SAVE JOURNAL (CREATE OR UPDATE)
    // =============================================
    async function saveJournal() {
        const title = document.getElementById('entryTitle').value.trim();
        const content = document.getElementById('entryContent').value.trim();
        const saveBtn = document.getElementById('saveBtn');

        if (!title || !content) {
            showToast('Please fill in both title and content.');
            return;
        }

        saveBtn.disabled = true;
        saveBtn.textContent = 'Saving...';

        try {
            const isEdit = editingId !== null;
            const url = isEdit ? `${API}/journals/${editingId}/` : `${API}/journals/`;
            const method = isEdit ? 'PUT' : 'POST';

            const res = await fetch(url, {
                method,
                headers: authHeaders(),
                body: JSON.stringify({ title, content })
            });

            if (res.ok) {
                closeModal();
                showToast(isEdit ? 'Entry updated ✓' : 'Entry saved ✓');
                fetchJournals(currentPage, currentSearch);
            } else {
                showToast('Something went wrong. Try again.');
            }

        } catch (err) {
            showToast('Cannot connect to server.');
        }

        saveBtn.disabled = false;
        saveBtn.textContent = editingId ? 'Update entry' : 'Save entry';
    }

    // =============================================
    // DELETE JOURNAL
    // =============================================
    async function deleteJournal(id) {
        if (!confirm('Delete this journal entry?')) return;

        try {
            const res = await fetch(`${API}/journals/${id}/`, {
                method: 'DELETE',
                headers: authHeaders()
            });

            if (res.status === 204) {
                showToast('Entry deleted');
                fetchJournals(currentPage, currentSearch);
            } else {
                showToast('Could not delete. Try again.');
            }
        } catch (err) {
            showToast('Cannot connect to server.');
        }
    }

    // =============================================
    // THEME SWITCHER
    // =============================================
    function toggleThemePanel() {
        document.getElementById('themePanel').classList.toggle('open');
    }

    function setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme === 'default' ? '' : theme);
        localStorage.setItem('journal_theme', theme);

        // update active state
        document.querySelectorAll('.theme-option').forEach(el => el.classList.remove('active'));
        document.getElementById(`theme-${theme}`)?.classList.add('active');

        toggleThemePanel();
    }

    function loadTheme() {
        const saved = localStorage.getItem('journal_theme') || 'default';
        setTheme(saved);
    }

    // =============================================
    // HELPERS
    // =============================================
    function updateCount(count, search) {
        const el = document.getElementById('journalCount');
        if (search) {
            el.textContent = `${count} result${count !== 1 ? 's' : ''} for "${search}"`;
        } else {
            el.textContent = `${count} entr${count !== 1 ? 'ies' : 'y'}`;
        }
    }

    function formatDate(iso) {
        const d = new Date(iso);
        return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function escapeHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function escapeJs(str) {
        return String(str).replace(/`/g, '\\`').replace(/\$/g, '\\$');
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // =============================================
    // KEYBOARD SHORTCUTS
    // =============================================
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeModal();
        if (e.key === 'n' && !document.getElementById('modalOverlay').classList.contains('open')) {
            openModal();
        }
    });

    // =============================================
    // INIT
    // =============================================
    // Check login
    if (!getToken()) {
        window.location.href = 'login.html';
    }

    loadTheme();
    fetchJournals();
</script>

</body>
</html>
