<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal — Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f0;
            font-family: Georgia, serif;
        }

        .card {
            background: white;
            padding: 48px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
        }

        h1 {
            font-size: 24px;
            font-weight: normal;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 36px;
            font-family: sans-serif;
        }

        .field {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 8px;
            font-family: sans-serif;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            font-family: sans-serif;
            color: #1a1a1a;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #888;
        }

        button {
            width: 100%;
            padding: 13px;
            background: #1a1a1a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-family: sans-serif;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }

        button:hover {
            background: #333;
        }

        button:disabled {
            background: #aaa;
            cursor: not-allowed;
        }

        .error {
            display: none;
            background: #fff0f0;
            border: 1px solid #ffcccc;
            color: #cc0000;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-family: sans-serif;
            margin-bottom: 20px;
        }

        .error.visible {
            display: block;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>My Journal</h1>
        <p class="subtitle">Sign in to your private space</p>

        <div class="error" id="errorBox">
            Invalid username or password.
        </div>

        <div class="field">
            <label>Username</label>
            <input 
                type="text" 
                id="username" 
                placeholder="Enter your username"
                autocomplete="username"
            />
        </div>

        <div class="field">
            <label>Password</label>
            <input 
                type="password" 
                id="password" 
                placeholder="Enter your password"
                autocomplete="current-password"
            />
        </div>

        <button id="loginBtn" onclick="handleLogin()">Sign in</button>
    </div>

<script>
    // =========================================
    // LOGIN FUNCTION
    // =========================================
    // What happens:
    // 1. Get username and password from inputs
    // 2. Send POST request to your Django JWT endpoint
    // 3. If success → store access token → redirect to journals
    // 4. If fail → show error message

    async function handleLogin() {
        // Step 1 — get values from inputs
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const errorBox = document.getElementById('errorBox');
        const loginBtn = document.getElementById('loginBtn');

        // hide any previous error
        errorBox.classList.remove('visible');

        // basic empty check
        if (!username || !password) {
            errorBox.textContent = 'Please enter username and password.';
            errorBox.classList.add('visible');
            return;
        }

        // Step 2 — disable button while loading
        loginBtn.disabled = true;
        loginBtn.textContent = 'Signing in...';

        try {
            // Step 3 — send POST request to your Django API
            const response = await fetch('http://127.0.0.1:8000/api/login/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (response.ok) {
                // Step 4 — store access token in localStorage
                localStorage.setItem('access_token', data.access);
                localStorage.setItem('refresh_token', data.refresh);

                // Step 5 — redirect to journals page
                window.location.href = 'journals.html';

            } else {
                // show error
                errorBox.textContent = 'Invalid username or password.';
                errorBox.classList.add('visible');
            }

        } catch (error) {
            // network error or server down
            errorBox.textContent = 'Cannot connect to server. Is Django running?';
            errorBox.classList.add('visible');
        }

        // re-enable button
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign in';
    }

    // =========================================
    // ALLOW ENTER KEY TO SUBMIT
    // =========================================
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') handleLogin();
    });

    // =========================================
    // IF ALREADY LOGGED IN → SKIP LOGIN PAGE
    // =========================================
    // If token already exists in storage, go straight to journals
    if (localStorage.getItem('access_token')) {
        window.location.href = 'journals.html';
    }
</script>

</body>
</html>
